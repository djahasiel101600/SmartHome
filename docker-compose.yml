version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    environment:
      - DJANGO_SECRET_KEY=docker-dev-secret-change-in-production
      - DJANGO_DEBUG=True
      - DJANGO_ALLOWED_HOSTS=*
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CORS_ALLOWED_ORIGINS=http://localhost,http://127.0.0.1,http://localhost:80
      - DATABASE_PATH=/app/data/db.sqlite3
    depends_on:
      - redis
    restart: unless-stopped

  celery-worker:
    build: ./backend
    command: celery -A config worker --loglevel=info
    volumes:
      - sqlite_data:/app/data
    environment:
      - DJANGO_SECRET_KEY=docker-dev-secret-change-in-production
      - DJANGO_DEBUG=True
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_PATH=/app/data/db.sqlite3
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  celery-beat:
    build: ./backend
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - sqlite_data:/app/data
    environment:
      - DJANGO_SECRET_KEY=docker-dev-secret-change-in-production
      - DJANGO_DEBUG=True
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_PATH=/app/data/db.sqlite3
    depends_on:
      - redis
      - backend
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  sqlite_data:
